<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расходы + Овердрафт</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            background: #eef2f5;
            margin: 0;
            padding: 30px 20px;
        }

        /* Общий контейнер для двух калькуляторов */
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        /* Карточка калькулятора */
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 24px 28px;
            flex: 1;
            min-width: 360px;
            transition: 0.2s;
        }

        .card h2 {
            margin: 0 0 10px;
            text-align: center;
            font-size: 1.4rem;
            color: #1a4e6e;
        }

        .row {
            margin-bottom: 6px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .label {
            display: inline-block;
            width: 180px;
            font-weight: 600;
            color: #1e4663;
        }

        input,
        button,
        textarea {
            font-size: 1rem;
            padding: 4px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            background: white;
        }

        input:focus,
        button:focus {
            outline: none;
            /* border-color: #1e6f5c; */
            box-shadow: 0 0 0 2px rgba(30, 111, 92, 0.2);
        }

        button {
            /* background: #1e6f5c; */
            background: #a2b1ad;
            /* color: white; */
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.1s;
        }

        button:hover {
            /* background: #0f5a4a; */
            background: #7ab8aa;
            /* transform: translateY(-1px); */
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin: 12px 0;
        }

        .radio-group label {
            font-weight: normal;
            width: auto;
        }

        textarea {
            width: 100%;
            min-height: 260px;
            font-family: 'Courier New', monospace;
            background: #fafcfd;
            resize: none;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 2px dotted #cbd5e1;
        }

        .inline-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .inline-group .field {
            flex: 2;
        }

        .small-note {
            font-size: 0.75rem;
            color: #4f6f8a;
            margin-top: 6px;
        }

        .result-line {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            /* border-bottom: 1px solid #e2e8f0; */
            font-size: 0.95rem;
        }

        .result-label {
            font-weight: 600;
            color: #1e4663;
        }

        .result-value {
            font-family: monospace;
            background: #f1f5f9;
            padding: 2px 12px;
            border-radius: 24px;
        }

        .output-area {
            border-radius: 20px;
        }

        .output-area--calculator {
            padding: 10px 0;
        }

        .output-area--overdraft {
            padding: 40px 160px 20px 40px;
        }

        button.copy-btn {
            margin-top: 12px;
            width: auto;
            padding: 8px 16px;
        }

        .separator {
            width: 100%;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
            color: #6c8eae;
        }

        @media (max-width: 900px) {
            .dashboard {
                flex-direction: column;
            }

            .label {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <!-- БЛОК 1: КАЛЬКУЛЯТОР ДОСТАВКИ (ЭКСПЕДИРОВАНИЕ) -->
        <div class="card">
            <h2>Калькулятор расходов</h2>
            <div class="row">
                <span class="label">Ставка нетто (USD):</span>
                <input type="text" id="price" value="0" placeholder="нетто USD">
            </div>
            <div class="row">
                <span class="label">Стоимость груза (USD):</span>
                <input type="text" id="insurance" value="0" placeholder="страховая стоимость">
            </div>
            <div class="radio-group">
                <label><input type="radio" name="delivery_type" value="standard" checked> Прямой (10%)</label>
                <label><input type="radio" name="delivery_type" value="expedition"> Экспедиция (5%)</label>
                <label><input type="checkbox" name="" id="ltl-mode"> LTL</label>
            </div>
            <div class="output-area output-area--calculator">
                <textarea id="resultShipping" rows="12" readonly></textarea>
                <button id="copyShippingBtn" class="copy-btn">Копировать</button>
            </div>
        </div>

        <div class="card">
            <h2>Расчёт Овердрафта</h2>
            <!-- <div class="row">
                <span class="label">Сумма кредита (USD):</span>
                <input type="text" id="usdAmount" value="8000" placeholder="8000">
            </div> -->
            <div class="row">
                <span class="label">Количество дней:</span>
                <input type="text" id="days" value="45" placeholder="45">
            </div>
            <div class="row">
                <span class="label">Годовая ставка (%):</span>
                <input type="text" id="annualPercent" value="13.13" placeholder="13.13">
            </div>
            <div class="row">
                <span class="label">Курс USD → BYN:</span>
                <div class="inline-group" style="flex:1">
                    <div class="field"><input type="text" id="usdRate" placeholder="загружается..."></div>
                    <button id="refreshRateBtn">Обновить</button>
                </div>
            </div>
            <div class="small-note" id="rateStatus">⏳ Загрузка курса НБРБ...</div>
            <!-- <button id="calcOverdraftBtn" style="margin: 12px 0 16px;">🧮 Рассчитать проценты</button> -->

            <div class="output-area output-area--overdraft">
                <div id="resultsOverdraft">
                    <div class="result-line"><span class="result-label">Сумма в USD:</span><span class="result-value"
                            id="resUsd">—</span></div>
                    <div class="result-line"><span class="result-label">Курс USD/BYN:</span><span class="result-value"
                            id="resRate">—</span></div>
                    <div class="result-line"><span class="result-label">Сумма в BYN:</span><span class="result-value"
                            id="resByn">—</span></div>
                    <div class="result-line"><span class="result-label">Дней:</span><span class="result-value"
                            id="resDays">—</span></div>
                    <div class="result-line"><span class="result-label">Годовая ставка:</span><span class="result-value"
                            id="resAnnual">—</span></div>
                    <div class="result-line"><span class="result-label">Дневная ставка:</span><span class="result-value"
                            id="resDaily">—</span></div>
                    <div class="result-line"><span class="result-label">Проценты (BYN):</span><span class="result-value"
                            id="resIntByn">—</span></div>
                    <div class="result-line"><span class="result-label">Проценты (USD):</span><span class="result-value"
                            id="resIntUsd">—</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ======================= 1. КАЛЬКУЛЯТОР ДОСТАВКИ (экспедирование) =======================
        const CONSTANTS_SHIP = {
            INSURANCE_RATE: 0.0015,
            RATE_DIFF_PERCENT: 0.01,
            ADDITIONAL_FEE: 20,
            PROFIT_RATES: { standard: 0.10, expedition: 0.05 },
            ALIGN_WIDTH: 6,
        };

        function leftAlign(num, width) {
            const numStr = String(num);
            const spaces = ' '.repeat(Math.max(0, width - numStr.length));
            return numStr + spaces;
        }

        function getNumber(id, defaultValue = 0) {
            const el = document.getElementById(id);
            if (!el) return defaultValue;
            const val = parseFloat(el.value.replace(',', '.'));
            return isNaN(val) ? defaultValue : val;
        }

        function calculateShipping() {
            const price = getNumber('price', 0);
            const cargoValue = getNumber('insurance', 0);
            const overdraftValue = Math.ceil(parseFloat(document.querySelector('#resIntUsd').innerText) || 0);
            const deliveryType = document.querySelector('input[name="delivery_type"]:checked')?.value || 'standard';
            const checkboxLtl = document.getElementById('ltl-mode');

            const insuranceFee = Math.ceil(cargoValue * CONSTANTS_SHIP.INSURANCE_RATE);
            const rateDiff = Math.ceil(price * CONSTANTS_SHIP.RATE_DIFF_PERCENT);

            const baseSum = (checkboxLtl.checked)
                ? price + insuranceFee
                : price + insuranceFee + rateDiff + overdraftValue + CONSTANTS_SHIP.ADDITIONAL_FEE;

            const profit = Math.ceil(baseSum * CONSTANTS_SHIP.PROFIT_RATES[deliveryType]);
            const total = baseSum + profit;
            const finalPrice = Math.ceil(total / 10) * 10;

            const w = CONSTANTS_SHIP.ALIGN_WIDTH;
            const isLtl = checkboxLtl ? checkboxLtl.checked : false;
            const overdraftStr = isLtl ? '' : `${leftAlign(overdraftValue, w)} USD Overdraft = 45 days\n`;
            const rateDiffStr = isLtl ? '' : `${leftAlign(rateDiff, w)} USD Курсовая разница (1%)\n`;
            const additionalFeeStr = isLtl ? '' : `${leftAlign(CONSTANTS_SHIP.ADDITIONAL_FEE, w)} USD платёжка\n`;

            const resultText = `Агент: Yusheng (ЗБК)
${leftAlign(price, w)} USD Freight
-      USD Довоз
${leftAlign(insuranceFee, w)} USD Страхование (от ${cargoValue}$)
${overdraftStr}${rateDiffStr}${additionalFeeStr}-----------------------------------
${leftAlign(baseSum, w)} USD 
${leftAlign(profit, w)} USD Profit
-----------------------------------
SELL: ${finalPrice} USD ${cargoValue > 0 ? '' : '+ страховка'}`;

            document.getElementById('resultShipping').value = resultText;
        }

        function copyShipping() {
            const textarea = document.getElementById('resultShipping');
            if (!textarea) return;
            // textarea.select();
            navigator.clipboard.writeText(textarea.value).then(() => {
                const btn = document.getElementById('copyShippingBtn');
                const original = btn.innerText;
                btn.innerText = '✓ Скопировано!';
                setTimeout(() => btn.innerText = original, 1500);
            }).catch(console.warn);
        }

        // ======================= 2. КАЛЬКУЛЯТОР ОВЕРДРАФТ (курс НБРБ) =======================
        async function fetchNBRB_USD_Rate() {
            const rateInput = document.getElementById('usdRate');
            const statusSpan = document.getElementById('rateStatus');
            statusSpan.innerHTML = '⏳ Загрузка курса с api.nbrb.by ...';
            const url = 'https://api.nbrb.by/exrates/rates/431';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                let rate = data.Cur_OfficialRate;
                if (rate && typeof rate === 'number' && rate > 0) {
                    rate = parseFloat(rate.toFixed(4));
                    rateInput.value = rate;
                    statusSpan.innerHTML = `✅ Курс обновлён: 1 USD = ${rate} BYN (официальный курс НБРБ)`;
                    calculateOverdraft();
                    return rate;
                } else {
                    throw new Error('Некорректный формат');
                }
            } catch (error) {
                console.error(error);
                statusSpan.innerHTML = `⚠️ Не удалось загрузить курс. Введите вручную.`;
                if (!rateInput.value || rateInput.value === '') {
                    rateInput.value = '2.95';
                    calculateOverdraft();
                }
                return null;
            }
        }

        function calculateOverdraft() {
            let usdAmount = parseFloat(document.getElementById('price').value);
            let days = parseInt(document.getElementById('days').value, 10);
            let annualPercent = parseFloat(document.getElementById('annualPercent').value);
            let usdRate = parseFloat(document.getElementById('usdRate').value);

            if (isNaN(usdAmount) || usdAmount <= 0) usdAmount = 0;
            if (isNaN(days) || days <= 0) days = 45;
            if (isNaN(annualPercent) || annualPercent < 0) annualPercent = 13.13;
            if (isNaN(usdRate) || usdRate <= 0) usdRate = 2.95;

            const annualRateDecimal = annualPercent / 100;
            const bynAmount = usdAmount * usdRate;
            const dailyRate = annualRateDecimal / 365;
            const interestByn = bynAmount * dailyRate * days;
            const interestUsd = interestByn / usdRate;

            document.getElementById('resUsd').innerHTML = usdAmount.toFixed(2) + ' USD';
            document.getElementById('resRate').innerHTML = usdRate.toFixed(4) + ' BYN';
            document.getElementById('resByn').innerHTML = bynAmount.toFixed(2) + ' BYN';
            document.getElementById('resDays').innerHTML = days + ' ' + declensionDays(days);
            document.getElementById('resAnnual').innerHTML = annualPercent.toFixed(2) + '% (годовая)';
            document.getElementById('resDaily').innerHTML = dailyRate.toFixed(9);
            document.getElementById('resIntByn').innerHTML = interestByn.toFixed(4) + ' BYN';
            document.getElementById('resIntUsd').innerHTML = interestUsd.toFixed(4) + ' USD';
        }

        function declensionDays(n) {
            n = Math.abs(n);
            if (n % 10 === 1 && n % 100 !== 11) return 'день';
            if ([2, 3, 4].includes(n % 10) && ![12, 13, 14].includes(n % 100)) return 'дня';
            return 'дней';
        }

        // ======================= ИНИЦИАЛИЗАЦИЯ =======================
        document.addEventListener('DOMContentLoaded', () => {
            const priceInput = document.getElementById('price');
            const insuranceInput = document.getElementById('insurance');
            const radios = document.querySelectorAll('input[name="delivery_type"]');
            const checkboxLtl = document.getElementById('ltl-mode');
            if (checkboxLtl) checkboxLtl.addEventListener('input', calculateShipping);
            if (priceInput) priceInput.addEventListener('input', calculateOverdraft);
            if (priceInput) priceInput.addEventListener('input', calculateShipping);
            if (insuranceInput) insuranceInput.addEventListener('input', calculateShipping);
            radios.forEach(radio => radio.addEventListener('change', calculateShipping));
            const copyShippingBtn = document.getElementById('copyShippingBtn');
            if (copyShippingBtn) copyShippingBtn.addEventListener('click', copyShipping);
            calculateOverdraft();
            calculateShipping();

            // ---- Овердрафт ----
            const usdAmount = document.getElementById('usdAmount');
            const daysField = document.getElementById('days');
            const annualField = document.getElementById('annualPercent');
            const usdRateField = document.getElementById('usdRate');
            // const calcBtn = document.getElementById('calcOverdraftBtn');
            const refreshBtn = document.getElementById('refreshRateBtn');

            if (usdAmount) usdAmount.addEventListener('input', calculateOverdraft);
            if (daysField) daysField.addEventListener('input', calculateOverdraft);
            if (annualField) annualField.addEventListener('input', calculateOverdraft);
            if (usdRateField) usdRateField.addEventListener('input', calculateOverdraft);
            // if (calcBtn) calcBtn.addEventListener('click', calculateOverdraft);
            if (refreshBtn) refreshBtn.addEventListener('click', async () => {
                await fetchNBRB_USD_Rate();
                calculateOverdraft();
            });

            // Загружаем курс НБРБ и делаем первый расчёт
            fetchNBRB_USD_Rate().then(() => calculateOverdraft());
        });
    </script>
</body>

</html>
